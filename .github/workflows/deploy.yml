name: DevSecOps Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

# ── Permission nécessaire pour GitHub Security Dashboard ──
permissions:
  contents: read
  security-events: write

jobs:
  security:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Build Maven
        run: mvn clean package -DskipTests

      # ── SAST ──────────────────────────────────────────────
      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v2
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      # ── SCA : dépendances opensource Maven ────────────────
      - name: Install Snyk
        uses: snyk/actions/setup@master

      - name: Snyk dependency scan (pom.xml)
        run: |
          snyk auth ${{ secrets.SNYK_TOKEN }}
          node --max-old-space-size=4096 $(which snyk) test \
            --all-projects \
            --severity-threshold=high \
            --json-file-output=snyk-results.json || true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
          NODE_OPTIONS: "--max-old-space-size=4096"

      - name: Upload Snyk results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: snyk-results
          path: snyk-results.json

      # ── Docker build ───────────────────────────────────────
      - name: Build Docker image
        run: docker build -t secure-java-app .

      # ── Container scan : image Docker ─────────────────────
      - name: Trivy scan (Docker image)
        uses: aquasecurity/trivy-action@0.20.0
        with:
          image-ref: secure-java-app
          severity: CRITICAL,HIGH
          format: sarif
          output: trivy-results.sarif
          exit-code: 0

      - name: Upload Trivy results to GitHub Security  # ← v3 → v4
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-results.sarif
          category: trivy-container-scan

      # Gate bloquant uniquement sur CRITICAL
      - name: Block on CRITICAL vulnerabilities
        uses: aquasecurity/trivy-action@0.20.0
        with:
          image-ref: secure-java-app
          severity: CRITICAL
          exit-code: 1
          format: table